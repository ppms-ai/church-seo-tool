<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Church SEO Content Generator</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      background: linear-gradient(to right, rgb(236, 157, 183), rgb(243, 227, 187));
      margin: 2rem;
      padding: 2rem;
    }

    h1 {
      font-size: 2rem;
      color: #333;
    }

    input, button {
      padding: 0.6rem;
      font-size: 1rem;
      margin-right: 1rem;
    }

    #results {
      margin-top: 2rem;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      padding: 1rem;
      border-radius: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    pre {
      background: #f0f0f0;
      padding: 1rem;
      overflow-x: auto;
      white-space: pre-wrap;
      border-radius: 8px;
    }

    button {
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 8px;
    }

    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>

  <h1>🎥 Church SEO Content Generator</h1>

  <input type="text" id="youtube-url" placeholder="Paste YouTube sermon URL here" size="50">
  <button onclick="generateContent()">✨ Generate Content</button>

  <div id="results"></div>

  <script src="main.js"></script>
</body>
</html>
